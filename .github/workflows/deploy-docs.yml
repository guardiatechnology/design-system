name: Deploy docs to GitHub Pages

# Builds both:
#   - docs/  (Astro)         → published at /design-system/
#   - Storybook              → published at /design-system/storybook/
# Combines them into a single /dist and publishes via github-pages.

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ─── Root package: Storybook ────────────────────────────────────
      - name: Install root dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Storybook
        run: npm run build-storybook
        env:
          GITHUB_PAGES_BASE: "/design-system/storybook/"

      # ─── docs/: Astro site ──────────────────────────────────────────
      - name: Install docs dependencies
        working-directory: docs
        run: npm install

      - name: Build Astro docs
        working-directory: docs
        run: npm run build

      # ─── Combine: astro output at root + storybook under /storybook ─
      - name: Assemble dist
        run: |
          mkdir -p site
          cp -R docs/dist/. site/
          mkdir -p site/storybook
          cp -R storybook-static/. site/storybook/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
