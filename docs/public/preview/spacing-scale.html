<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><title>Guardia · Espaçamento</title>
<link rel="stylesheet" href="_base.css">
<style>
  .row { display: grid; grid-template-columns: 100px 1fr 60px; gap: 16px; align-items: center; padding: 8px 0; }
  .token-name { font-family: var(--font-mono); font-size: 12px; color: var(--violet-700); }
  .bar { height: 14px; background: var(--orange-500); border-radius: 2px; }
  .px { font-family: var(--font-mono); font-size: 12px; color: var(--gray-500); text-align: right; }
</style></head><body>
  <div class="eyebrow">ESPAÇAMENTO</div>
  <h1 class="card-title">Escala base 4px</h1>
  <p class="card-sub">Múltiplos de 4 garantem alinhamento vertical com o corpo de texto em dashboards, formulários e listas densas.</p>
  <div class="row"><code class="token-name">--space-1</code><div class="bar" style="width:4px"></div><span class="px">4</span></div>
  <div class="row"><code class="token-name">--space-2</code><div class="bar" style="width:8px"></div><span class="px">8</span></div>
  <div class="row"><code class="token-name">--space-3</code><div class="bar" style="width:12px"></div><span class="px">12</span></div>
  <div class="row"><code class="token-name">--space-4</code><div class="bar" style="width:16px"></div><span class="px">16</span></div>
  <div class="row"><code class="token-name">--space-5</code><div class="bar" style="width:20px"></div><span class="px">20</span></div>
  <div class="row"><code class="token-name">--space-6</code><div class="bar" style="width:24px"></div><span class="px">24</span></div>
  <div class="row"><code class="token-name">--space-8</code><div class="bar" style="width:32px"></div><span class="px">32</span></div>
  <div class="row"><code class="token-name">--space-10</code><div class="bar" style="width:40px"></div><span class="px">40</span></div>
  <div class="row"><code class="token-name">--space-12</code><div class="bar" style="width:48px"></div><span class="px">48</span></div>
  <div class="row"><code class="token-name">--space-16</code><div class="bar" style="width:64px"></div><span class="px">64</span></div>
  <div class="row"><code class="token-name">--space-20</code><div class="bar" style="width:80px"></div><span class="px">80</span></div>
  <div class="row"><code class="token-name">--space-24</code><div class="bar" style="width:96px"></div><span class="px">96</span></div>
</body></html>
